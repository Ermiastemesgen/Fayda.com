<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAYDA - Your Social Directory</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">🔗</span>
      <span class="brand-name">FAYDA</span>
    </div>
    <ul class="nav-links">
      <li><a href="#home" class="active">Home</a></li>
      <li><a href="#categories">Categories</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">🌙</button>
      <button class="nav-menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#home">Home</a>
    <a href="#categories">Categories</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- HERO -->
  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Discover Your Favorite <span class="gradient-text">Platforms</span></h1>
      <p>All your essential links in one beautiful place.</p>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search categories..." aria-label="Search categories" />
      </div>
    </div>
  </section>

  <!-- CATEGORIES -->
  <section class="categories-section" id="categories">
    <h2 class="section-title">Categories</h2>
    <div class="grid" id="categoryGrid"></div>
    <p class="no-results" id="noResults" hidden>No categories found.</p>
  </section>

  <!-- CONTACT -->
  <section class="contact-section" id="contact">
    <h2 class="section-title">Contact</h2>
    <form class="contact-form" onsubmit="handleSubmit(event)">
      <input type="text" placeholder="Your name" required aria-label="Your name" />
      <input type="email" placeholder="Your email" required aria-label="Your email" />
      <textarea placeholder="Your message" rows="4" required aria-label="Your message"></textarea>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 FAYDA. Built with ❤️</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
